# Deploy self-hosted (Hetzner Cloud). Caddy faz TLS automático (Let's Encrypt).
# Suba com:  DOMAIN=seu.dominio.com docker compose up -d --build
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3000
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
